codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
      root:
        flags:
          - root
        target: auto
        threshold: 1%
      client:
        flags:
          - client
        target: auto
        threshold: 1%

flags:
  root:
    carryforward: true
  client:
    carryforward: true

