- description: "# Object Deletion\n\n> **Optional Functionality**: Delete support\
    \ is an **optional** extension to the DRS API. Not all DRS servers are required\
    \ to implement delete functionality. Clients should check for the availability\
    \ of delete endpoints before attempting to use them.\n\nDRS delete functionality\
    \ allows suitably authenticated clients to request that DRS objects are removed\
    \ from the server and, optionally, to request that the server attempt to delete\
    \ the underlying data.\n\nServers should ensure that they trust clients from whom\
    \ they receive delete requests, and may choose to implement \"soft\" deletes to\
    \ minimise the risk of accidental or malicious requests. The DRS specification\
    \ does not currently provide explicit support for soft deletes. Because delete\
    \ support is optional, servers operating in untrusted environments may choose\
    \ not to support delete operations at all.\n\nIn combination with the `/objects/register`\
    \ endpoint, metadata only delete requests offer a means for clients to update\
    \ DRS metadata without affecting the underlying data, and without introducing\
    \ additional update operations which would complicate server implementation.\n\
    \nClients can express a preference that the underlying data referred to by the\
    \ deleted DRS object(s) is deleted with the `delete_storage_data` parameter. Servers\
    \ are free to interpret this as they choose, and can advertise whether they support\
    \ it at all with the `deleteStorageDataSupported` flag. Servers that choose to\
    \ attempt to honour the request need not perform this operation synchronously\
    \ and may, for example, register the file for later deletion. Implementations\
    \ may also choose to ensure that no other DRS object registered in the server\
    \ refers to the underlying data before deleting. Servers may not have the necessary\
    \ permissions to delete the data from the backend even if they would like to do\
    \ so, or may encounter errors when they attempt deletion. In the case that a DRS\
    \ object refers to data stored in multiple backends (e.g. has multiple `access_method`s)\
    \ the server may attempt to delete the data from all or only some of the backends.\n\
    \nFor these reasons clients MUST NOT depend on the server deleting the underlying\
    \ storage data even if the server advertises that `deleteStorageDataSupported`\
    \ and the client sets the `delete_storage_data` flag.\n\nIn situations where the\
    \ DRS server controls the storage backend, DRS delete support offers a convenient\
    \ vendor-neutral way for clients to update and delete DRS objects and corresponding\
    \ data.\n\nFor bulk deletes using the `/objects/delete` endpoint the server SHOULD\
    \ implement transaction semantics: if any object fails validation or deletion,\
    \ the entire request should fail and no objects are deleted and no attempt is\
    \ made to delete from underlying storage for any object.\n\n## Design principles\n\
    \n- **Optional**: Delete support is completely optional\n- **Safety**: Preserves\
    \ underlying data in storage unless explicitly requested\n- **Backward compatible**:\
    \ No impact on existing DRS functionality\n- **Flexible authentication**: Supports\
    \ GA4GH Passports, Bearer tokens, API keys\n- **Use POST rather than DELETE**:\
    \ GA4GH Passports require request bodies, which DELETE methods don't reliably\
    \ support across all HTTP infrastructure. POST ensures broad compatibility.\n\n\
    ## Service Discovery\n\nCheck `/service-info` for delete capabilities:\n\n```json\n\
    {\n  \"drs\": {\n    \"uploadRequestSupported\": true,\n    \"objectRegistrationSupported\"\
    : true,\n    \"supportedUploadMethods\": [\"s3\", \"https\"],\n    \"relatedFileStorageSupported\"\
    : true,\n    \"deleteSupported\": true,\n    \"maxBulkDeleteLength\": 100,\n \
    \   \"deleteStorageDataSupported\": true\n  }\n}\n```\n\n- **`deleteSupported`**:\
    \ Whether server supports deletion\n- **`maxBulkDeleteLength`**: Maximum objects\
    \ per bulk delete request  \n- **`deleteStorageDataSupported`**: Whether server\
    \ can attempt to delete underlying storage files\n\n### Single Object Delete:\
    \ `POST /objects/{object_id}/delete`\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/drs_object_123456/delete\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"passports\": [\"...\"\
    ], \"delete_storage_data\": false}'\n# Response: 204 No Content (indicates metadata\
    \ deletion success only)\n```\n\n**Note**: HTTP responses indicate metadata deletion\
    \ status only. Storage deletion (`delete_storage_data: true`) is a best effort\
    \ attempt with no guarantee of success.\n\n### Bulk Object Delete: `POST /objects/delete`\n\
    \n```bash\ncurl -X POST \"https://drs.example.org/objects/delete\" \\\n  -H \"\
    Content-Type: application/json\" \\\n  -d '{\n    \"bulk_object_ids\": [\"obj_1\"\
    , \"obj_2\", \"obj_3\"],\n    \"passports\": [\"...\"],\n    \"delete_storage_data\"\
    : false\n  }'\n# Response: 204 No Content (all metadata deleted) or 4xx error\
    \ (no objects deleted)\n```\n\n## Authentication\n\n**GA4GH Passports** (in request\
    \ body):\n\n```json\n{\"passports\": [\"eyJhbGci...\"], \"delete_storage_data\"\
    : false}\n```\n\n**Bearer Tokens** (in headers):\n\n```bash\ncurl -H \"Authorization:\
    \ Bearer token\" -d '{\"delete_storage_data\": false}' ...\n```\n\n## Underlying\
    \ Storage Data\n\n**Important**: Storage data deletion is never guaranteed. Even\
    \ when `delete_storage_data: true` is requested and the server supports it, the\
    \ actual deletion may fail due to permissions, network issues, or storage service\
    \ errors. Clients shoud not depend on storage deletion success.\n\nClients can\
    \ request that the server attempts to delete the underlying data referred to by\
    \ the DRS object using the `delete_storage_data` parameter.\n\n**`delete_storage_data:\
    \ false`** (default): Removes DRS object metadata only, preserves underlying storage\
    \ files\n\n**`delete_storage_data: true`**: Removes metadata AND requests server\
    \ attempt to delete underlying storage files (requires `deleteStorageDataSupported:\
    \ true`, **success not guaranteed**)\n\n## Update Pattern\n\nRather than introducing\
    \ additional operations and endpoints for updating DRS objects, servers can allow\
    \ clients to use the metadata-only deletion and object registration endpoints\
    \ to create a new DRS object with updated metadata while leaving the underlying\
    \ data in place.\n\n**Metadata update steps:**\n\n1. Delete metadata only: `POST\
    \ /objects/{id}/delete` with `delete_storage_data: false`\n2. Re-register object:\
    \ `POST /objects/register` with updated metadata\n\n```bash\n# Delete metadata\
    \ (preserves storage)\ncurl -X POST \".../objects/obj_123/delete\" -d '{\"delete_storage_data\"\
    : false}'\n# Re-register with updates\ncurl -X POST \".../objects/register\" -d\
    \ '{\"candidates\": [{\"name\": \"updated.txt\", ...}]}'\n```\n\n## Error Responses\n\
    \n- **400**: Unsupported storage deletion or invalid request parameters\n- **403**:\
    \ Insufficient permissions for any object in the request\n- **404**: Any object\
    \ not found or delete endpoints not supported by server\n- **413**: Bulk request\
    \ exceeds `maxBulkDeleteLength` limit\n\n## Examples\n\n**Metadata Update:**\n\
    \n```bash\ncurl \".../service-info\"  # Check capabilities\ncurl -X POST \".../objects/obj_123/delete\"\
    \ -d '{\"delete_storage_data\": false}'\ncurl -X POST \".../objects/register\"\
    \ -d '{\"candidates\": [{\"name\": \"updated.vcf\", ...}]}'\n```\n\n**Complete\
    \ Removal:**\n\n```bash\ncurl -X POST \".../objects/obj_456/delete\" -H \"Authorization:\
    \ Bearer token\" \\\n  -d '{\"delete_storage_data\": true}'\n```\n\n**Bulk Delete\
    \ (Atomic):**\n\n```bash\ncurl -X POST \".../objects/delete\" -d '{\n  \"bulk_object_ids\"\
    : [\"obj_1\", \"obj_2\"],\n  \"passports\": [\"...\"],\n  \"delete_storage_data\"\
    : false\n}'\n# All objects deleted or none deleted (transactional)\n```\n\n##\
    \ Best Practices\n\n**Clients:** Check service-info, default to safe deletion,\
    \ handle transactional failures, respect limits, confirm destructive operations,\
    \ do not rely on underlying storage deletion\n\n**Servers:** Advertise capabilities,\
    \ validate permissions, implement atomic transactions, implement limits, use versioning\
    \ to avoid inadvertent deletion.\n\n## Security Considerations\n\n- **Authentication**:\
    \ Validate GA4GH Passports and Bearer tokens\n- **HTTPS Required**: Protect credentials\
    \ in transit\n- **Rate Limiting**: Prevent abuse of delete endpoints\n- **Input\
    \ Validation**: Sanitize all request parameters\n\n## Backward Compatibility\n\
    \nDelete functionality is designed to be backward compatible:\n\n- **No Impact\
    \ on Existing Endpoints**: All existing DRS endpoints remain unchanged\n- **Optional\
    \ Implementation**: Servers can ignore delete functionality entirely\n- **Graceful\
    \ Degradation**: Clients receive 404 responses when delete is not supported\n\
    - **Safe Defaults**: New fields in service-info have safe default values, and\
    \ requests default to leaving underlying data in place.\n"
  name: Object Deletion
- description: "# Access Method Updates\n\n> **Optional Functionality**: Access method\
    \ updates are optional extensions to the DRS API. Not all DRS servers are required\
    \ to implement this functionality. Clients should check `/service-info` for `accessMethodUpdateSupported`\
    \ before attempting to use these endpoints.\n\nAccess method update endpoints\
    \ allows authorized clients to modify how existing DRS objects can be accessed\
    \ without changing the core object metadata (size, checksums, name). This is useful\
    \ for storage migrations, adding mirrors, or updating URLs.\n\nThese endpoints\
    \ will overwrite existing access methods for an object, if clients want to add\
    \ access methods in addition to existing ones for objects they should first retrieve\
    \ the current access methods and include them in the update request along with\
    \ the new methods.\n\n## Use Cases\n\n- **Storage Migration**: Move data between\
    \ storage providers while keeping same DRS object\n- **Mirror Addition**: Add\
    \ CDN or regional access points for better performance  \n- **URL Refresh**: Update\
    \ changed domain names\n- **Access Optimization**: Add or remove access methods\
    \ based on performance or cost\n\n## Design Principles\n\n- **Optional**: Access\
    \ method update support is completely optional\n- **Immutable Core**: Only access\
    \ methods can be updated - size, checksums, name remain unchanged\n- **Atomic\
    \ Bulk Operations**: All updates succeed or all fail (transactional)\n- **Optional\
    \ Validation**: Servers MAY validate new access methods point to same data\n-\
    \ **Flexible Authentication**: Supports GA4GH Passports, Bearer tokens, API keys\n\
    \n## Service Discovery\n\nCheck `/service-info` for access method update capabilities:\n\
    \n```json\n{\n  \"drs\": {\n    \"accessMethodUpdateSupported\": true,\n    \"\
    maxBulkAccessMethodUpdateLength\": 100,\n    \"validateAccessMethodUpdates\":\
    \ false\n  }\n}\n```\n\n- **`accessMethodUpdateSupported`**: Whether server supports\
    \ access method updates\n- **`maxBulkAccessMethodUpdateLength`**: Maximum objects\
    \ per bulk update request\n- **`validateAccessMethodUpdates`**: Whether server\
    \ validates new access methods\n\n## Single Object Update\n\nUpdate access methods\
    \ for a single DRS object:\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/obj_123/access-methods\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"access_methods\"\
    : [\n      {\n        \"type\": \"https\",\n        \"access_url\": {\n      \
    \    \"url\": \"https://new-cdn.example.org/data/file.bam\"\n        }\n     \
    \ },\n      {\n        \"type\": \"s3\",\n        \"access_id\": \"s3,\n     \
    \   \"access_url\": {\n          \"url\": \"s3://new-bucket/migrated/file.bam\"\
    \n        }\n      }\n    ]\n  }'\n```\n\n## Bulk Object Update\n\nUpdate access\
    \ methods for multiple objects atomically:\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/access-methods\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"updates\": [\n\
    \      {\n        \"object_id\": \"obj_123\",\n        \"access_methods\": [\n\
    \          {\n            \"type\": \"https\",\n            \"access_url\": {\"\
    url\": \"https://new-location.com/file1.bam\"}\n          }\n        ]\n     \
    \ },\n      {\n        \"object_id\": \"obj_456\", \n        \"access_methods\"\
    : [\n          {\n            \"type\": \"s3\",\n            \"access_url\": {\"\
    url\": \"s3://new-bucket/file2.vcf\"}\n          }\n        ]\n      }\n    ]\n\
    \  }'\n```\n\n## Authentication\n\n**GA4GH Passports** (in request body):\n```json\n\
    {\n  \"access_methods\": [...],\n  \"passports\": [\"eyJhbGci...\"]\n}\n```\n\n\
    **Bearer Tokens** (in headers):\n```bash\ncurl -H \"Authorization: Bearer token\"\
    \ -d '{\"access_methods\": [...]}' ...\n```\n\n## Validation\n\nServers MAY validate\
    \ that new access methods point to the same data by checkingm file availability,\
    \ checksums or file content. Validation behavior is advertised in `validateAccessMethodUpdates`\
    \ service-info field.\n\n\n## Error Responses\n\n- **400**: Invalid access methods\
    \ or validation failure\n- **401**: Authentication required\n- **403**: Insufficient\
    \ permissions for object(s)\n- **404**: Object not found or access method updates\
    \ not supported\n- **413**: Bulk request exceeds `maxBulkAccessMethodUpdateLength`\
    \ limit\n\n## Examples\n\n**Storage Migration:**\n```bash\n# Check server capabilities\n\
    curl \"https://drs.example.org/service-info\"\n\n# Update single object after\
    \ migration\ncurl -X POST \"https://drs.example.org/objects/obj_123/access-methods\"\
    \ \\\n  -d '{\"access_methods\": [{\"type\": \"s3\", \"access_url\": {\"url\"\
    : \"s3://new-bucket/file.bam\"}}]}'\n```\n\n**Add CDN Mirror:**\n```bash\n# Add\
    \ additional access method without removing existing ones\ncurl -X POST \"https://drs.example.org/objects/obj_456/access-methods\"\
    \ \\\n  -d '{\n    \"access_methods\": [\n      {\"type\": \"https\", \"access_url\"\
    : {\"url\": \"https://origin.example.org/file.vcf\"}},\n      {\"type\": \"https\"\
    , \"access_url\": {\"url\": \"https://cdn.example.org/file.vcf\"}}\n    ]\n  }'\n\
    ```\n\n**Bulk Migration:**\n```bash\n# Migrate multiple objects atomically\ncurl\
    \ -X POST \"https://drs.example.org/objects/access-methods\" \\\n  -d '{\n   \
    \ \"updates\": [\n      {\"object_id\": \"obj_1\", \"access_methods\": [...]},\n\
    \      {\"object_id\": \"obj_2\", \"access_methods\": [...]}\n    ]\n  }'\n```\n\
    \n## Best Practices\n\n**Clients**: Check service-info first, handle atomic transaction\
    \ failures, respect bulk limits, verify permissions\n\n**Servers**: Advertise\
    \ capabilities clearly, implement atomic transactions for bulk operations, validate\
    \ permissions, consider optional validation for data integrity\n\n## Backward\
    \ Compatibility\n\nAccess method update functionality is designed to be backward\
    \ compatible:\n\n- **No Impact on Existing Endpoints**: All existing DRS endpoints\
    \ remain unchanged\n- **Optional Implementation**: Servers can ignore this functionality\
    \ entirely  \n- **Graceful Degradation**: Clients receive 404 responses when not\
    \ supported\n- **Safe Defaults**: New service-info fields have safe default values"
  name: Access Method Update
paths:
  /objects:
    options:
      description: Returns a structure that contains for each DrsObjects a list of
        `Authorizations` that can be used to determine how to authorize requests to
        `GetObject` or `PostObject` (or bulk equivalents).
      operationId: OptionsBulkObject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkObjectIdNoPassport"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionsBulkObject_200_response"
          description: '`Authorizations` were found successfully'
        "204":
          description: '`Authorizations` are not supported for this object. Default
            to `None`.'
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: The request is malformed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: The requested `DrsObject` wasn't found.
        "405":
          description: '`Authorizations` are not supported for this object. Default
            to `None`.'
        "413":
          content:
            application/json:
              examples:
                bulk_limit_exceeded:
                  description: Request contains more objects than server's maximum
                    bulk delete limit
                  summary: Bulk delete limit exceeded
                  value:
                    msg: Bulk delete request contains 150 objects but server maximum
                      is 100. Check maxBulkDeleteLength in service-info.
                    status_code: 413
                request_size_too_large:
                  description: The overall request payload exceeds server limits
                  summary: Request payload too large
                  value:
                    msg: Request payload size exceeds server limit of 1MB
                    status_code: 413
              schema:
                $ref: "#/components/schemas/Error"
          description: The bulk request is too large.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: An unexpected error occurred.
      security:
      - {}
      summary: Get Authorization info about multiple DrsObjects.
      tags:
      - Objects
      x-swagger-router-controller: ga4gh.drs.server
    post:
      description: |-
        Returns an array of object metadata and access methods for the specified object IDs.
        The request is limited to use passports (one or more) or a single bearer token,  so make sure your bulk request is for objects that all use the same passports/token.
        **Note**: To register new DRS objects, use the dedicated `/objects/register` endpoint.
      operationId: GetBulkObjects
      parameters:
      - description: |-
          If false and the object_id refers to a bundle, then the ContentsObject array contains only those objects directly contained in the bundle. That is, if the bundle contains other bundles, those other bundles are not recursively included in the result.
          If true and the object_id refers to a bundle, then the entire set of objects in the bundle is expanded. That is, if the bundle contains other bundles, then those other bundles are recursively expanded and included in the result. Recursion continues through the entire sub-tree of the bundle.
          If the object_id refers to a blob, then the query parameter is ignored.
        example: false
        in: query
        name: expand
        schema:
          type: boolean
      requestBody:
        $ref: "#/components/requestBodies/BulkObjectBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBulkObjects_200_response"
          description: The `DrsObjects` were found successfully
        "202":
          description: |
            The operation is delayed and will continue asynchronously. The client should retry this same request after the delay specified by Retry-After header.
          headers:
            Retry-After:
              description: |
                Delay in seconds. The client should retry this same request after waiting for this duration. To simplify client response processing, this must be an integral relative time in seconds. This value SHOULD represent the minimum duration the client should wait before attempting the operation again with a reasonable expectation of success. When it is not feasible for the server to determine the actual expected delay, the server may return a brief, fixed value instead.
              schema:
                format: int64
                type: integer
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: The request is malformed.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: The request is unauthorized.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: The requester is not authorized to perform this action.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: The requested `DrsObject` wasn't found.
        "413":
          content:
            application/json:
              examples:
                bulk_limit_exceeded:
                  description: Request contains more objects than server's maximum
                    bulk delete limit
                  summary: Bulk delete limit exceeded
                  value:
                    msg: Bulk delete request contains 150 objects but server maximum
                      is 100. Check maxBulkDeleteLength in service-info.
                    status_code: 413
                request_size_too_large:
                  description: The overall request payload exceeds server limits
                  summary: Request payload too large
                  value:
                    msg: Request payload size exceeds server limit of 1MB
                    status_code: 413
              schema:
                $ref: "#/components/schemas/Error"
          description: The bulk request is too large.
        "500":
          content:
