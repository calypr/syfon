    \ s3://genomics-uploads/x7k9m/sample.bam.bai\n```\n\nRegister Both DRS Objects:\n\
    \n```http\nPOST /objects/register\nContent-Type: application/json\n\n{\n  \"candidates\"\
    : [\n    {\n      \"name\": \"sample.bam\",\n      \"size\": 1073741824,\n   \
