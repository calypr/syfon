name: Install Script Test

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, runner: ubuntu-latest }
          - { os: linux, arch: arm64, runner: ubuntu-24.04-arm }
          - { os: darwin, arch: amd64, runner: macos-latest }
          - { os: darwin, arch: arm64, runner: macos-latest }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Default Version (Latest Release)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x install.sh
          ./install.sh
          # GITHUB_PATH is typically updated by the script, explicitly setting here to ensure it's run successfully
          export PATH="$PATH:$HOME/.local/bin"
          syfon --help
          syfon version
