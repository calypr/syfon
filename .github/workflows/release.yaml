# Cuts a GitHub release when the root binary or one of the sibling Go modules
# materially changes on development, and also on manual semver/rc tag pushes.
# For development-triggered releases, tags the merged commit first, then commits
# go.mod cleanup back to development after the GitHub Release is created.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_run:
    workflows:
      - Syfon CI
    types:
      - completed
    branches:
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  prepare:
    name: Prepare release tag
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write

    outputs:
      root_tag: ${{ steps.version.outputs.root_tag }}
      apigen_tag: ${{ steps.version.outputs.apigen_tag }}
      client_tag: ${{ steps.version.outputs.client_tag }}
      sha: ${{ steps.version.outputs.sha }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve versions and tag merged commit
        id: version
        env:
          HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ "$EVENT_NAME" == 'push' ]]; then
            {
              echo "root_tag=$REF_NAME"
              echo "apigen_tag="
              echo "client_tag="
              echo "sha=$HEAD_SHA"
            } >> "$GITHUB_OUTPUT"
            echo "Using existing root tag: $REF_NAME"
            exit 0
          fi

          latest_tag_for() {
            local pattern="$1"
            local regex="$2"
            git tag --list "$pattern" --sort=-version:refname | grep -E "$regex" | head -n1 || true
          }

          bump_patch() {
            local latest="$1"
            if [[ -z "$latest" ]]; then
              echo "v0.1.0"
              return 0
            fi

            local base major minor patch
            base="${latest#*/}"
            base="${base#v}"
            IFS=. read -r major minor patch <<<"$base"
            patch=$((10#$patch + 1))
            if [[ $patch -gt 9 ]]; then
              patch=0
              minor=$((10#$minor + 1))
              if [[ $minor -gt 9 ]]; then
                minor=0
                major=$((10#$major + 1))
              fi
            fi
            echo "v${major}.${minor}.${patch}"
          }

          changed_files_from() {
            local base="$1"
            shift
            if [[ -n "$base" ]]; then
              git diff --name-only "${base}..${HEAD_SHA}" -- "$@"
            else
              git diff --name-only "${HEAD_SHA}^..${HEAD_SHA}" -- "$@"
            fi
          }

          root_latest=$(latest_tag_for 'v[0-9]*' '^v[0-9]+\.[0-9]+\.[0-9]+$')
          apigen_latest=$(latest_tag_for 'apigen/v[0-9]*' '^apigen/v[0-9]+\.[0-9]+\.[0-9]+$')
          client_latest=$(latest_tag_for 'client/v[0-9]*' '^client/v[0-9]+\.[0-9]+\.[0-9]+$')

          root_files=$(changed_files_from "$root_latest")
          apigen_files=$(changed_files_from "$apigen_latest" apigen)
          client_files=$(changed_files_from "$client_latest" client)

          root_base_changed=false
          apigen_base_changed=false
          client_base_changed=false

          if printf '%s\n' "$root_files" \
            | grep -Ev '^(apigen/|client/)' \
            | grep -Ev '(_test\.go$|^$)' \
            | grep -Eq '(^|/).+\.go$|^go\.(mod|sum)$|^Makefile$|^Dockerfile$|^install\.sh$|^\.github/workflows/release\.yml$'; then
            root_base_changed=true
          fi

          if printf '%s\n' "$apigen_files" \
            | grep -Ev '(_test\.go$|^$)' \
            | grep -Eq '^apigen/.+\.go$|^apigen/go\.(mod|sum)$'; then
            apigen_base_changed=true
          fi

          if printf '%s\n' "$client_files" \
            | grep -Ev '(_test\.go$|^$)' \
            | grep -Eq '^client/.+\.go$|^client/go\.(mod|sum)$'; then
            client_base_changed=true
          fi

          root_existing=$(git tag --points-at "$HEAD_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          apigen_existing=$(git tag --points-at "$HEAD_SHA" | grep -E '^apigen/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          client_existing=$(git tag --points-at "$HEAD_SHA" | grep -E '^client/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

          if [[ -n "$apigen_existing" ]]; then
            apigen_tag="$apigen_existing"
          elif [[ "$apigen_base_changed" == true ]]; then
            apigen_tag="apigen/$(bump_patch "$apigen_latest")"
          else
            apigen_tag=""
          fi

          if [[ -n "$client_existing" ]]; then
            client_tag="$client_existing"
          elif [[ "$client_base_changed" == true || -n "$apigen_tag" ]]; then
            client_tag="client/$(bump_patch "$client_latest")"
          else
            client_tag=""
          fi

          if [[ -n "$root_existing" ]]; then
            root_tag="$root_existing"
          elif [[ "$root_base_changed" == true || -n "$client_tag" || -n "$apigen_tag" ]]; then
            root_tag="$(bump_patch "$root_latest")"
          else
            root_tag=""
          fi

          if [[ -z "$root_tag" ]]; then
            {
              echo "root_tag="
              echo "apigen_tag=$apigen_tag"
              echo "client_tag=$client_tag"
              echo "sha=$HEAD_SHA"
            } >> "$GITHUB_OUTPUT"
            echo "No release needed."
            exit 0
          fi

          release_sha="$HEAD_SHA"

          for tag in "$apigen_tag" "$client_tag" "$root_tag"; do
            if [[ -z "$tag" ]]; then
              continue
            fi

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag already exists: $tag"
              continue
            fi

            git tag "$tag" "$release_sha"
            git push origin "$tag"
            echo "Tagged $tag at $release_sha"
          done

          {
            echo "root_tag=$root_tag"
            echo "apigen_tag=$apigen_tag"
            echo "client_tag=$client_tag"
            echo "sha=$release_sha"
          } >> "$GITHUB_OUTPUT"

          printf 'Root release tag: %s\n' "$root_tag"
          printf 'Apigen release tag: %s\n' "$apigen_tag"
          printf 'Client release tag: %s\n' "$client_tag"
          printf 'Release SHA: %s\n' "$release_sha"

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare]
    if: needs.prepare.outputs.root_tag != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: amd64, runner: ubuntu-latest      }
          - { os: linux,  arch: arm64, runner: ubuntu-24.04-arm   }
          - { os: darwin, arch: amd64, runner: macos-latest       }
          - { os: darwin, arch: arm64, runner: macos-latest       }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_UPSTREAM: ${{ github.server_url }}/${{ github.repository }}
        run: |
          CGO_ENABLED=1 make build
          mv syfon syfon-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syfon-${{ matrix.os }}-${{ matrix.arch }}
          path: syfon-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.root_tag != ''

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: syfon-*
          merge-multiple: true

      - name: Package archives and checksums
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.root_tag }}
        run: |
          set -euo pipefail
          cd dist
          for binary in syfon-linux-* syfon-darwin-*; do
            [[ -f "$binary" ]] || continue
            archive="${binary}-${RELEASE_TAG}.tar.gz"
            cp "$binary" syfon
            tar -czf "$archive" syfon
            rm syfon
          done
          sha256sum *.tar.gz > "syfon-${RELEASE_TAG}-checksums.txt"
          ls -lh

      - name: Generate changelog
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.root_tag }}
        run: |
          set -euo pipefail
          prev=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p' || true)
          if [[ -n "${prev}" ]]; then
            notes=$(git log "${prev}".."${RELEASE_TAG}" --pretty=format:'- %s (%h)' --no-merges)
          else
            notes=$(git log "${RELEASE_TAG}" --pretty=format:'- %s (%h)' --no-merges)
          fi
          echo "$notes" > release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.root_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
            exit 0
          fi

          flags=""
          if [[ "$RELEASE_TAG" =~ -rc\.[0-9]+$ ]]; then
            flags="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            ${flags} \
            dist/*.tar.gz \
            "dist/syfon-${RELEASE_TAG}-checksums.txt"

  sync-module-versions:
    name: Sync module versions
    needs: [prepare, release]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.root_tag != ''

    permissions:
      contents: write

    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: development

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Replace local module links with released versions
        env:
          ROOT_TAG: ${{ needs.prepare.outputs.root_tag }}
          APIGEN_TAG: ${{ needs.prepare.outputs.apigen_tag }}
          CLIENT_TAG: ${{ needs.prepare.outputs.client_tag }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          apigen_version="${APIGEN_TAG#apigen/}"
          client_version="${CLIENT_TAG#client/}"

          drop_replace_if_present() {
            local module_dir="$1"
            local target="$2"
            if [[ -f "${module_dir}/go.mod" ]]; then
              (cd "$module_dir" && go mod edit -dropreplace "$target") || true
            fi
          }

          require_if_set() {
            local module_dir="$1"
            local target="$2"
            local version="$3"
            if [[ -n "$version" && -f "${module_dir}/go.mod" ]]; then
              (cd "$module_dir" && go mod edit -require="${target}@${version}")
            fi
          }

          tidy_if_present() {
            local module_dir="$1"
            if [[ -f "${module_dir}/go.mod" ]]; then
              (cd "$module_dir" && go mod tidy)
            fi
          }

          for module_dir in . client apigen; do
            drop_replace_if_present "$module_dir" github.com/calypr/syfon/apigen
            drop_replace_if_present "$module_dir" github.com/calypr/syfon/client
          done

          if [[ -n "$APIGEN_TAG" ]]; then
            require_if_set . github.com/calypr/syfon/apigen "$apigen_version"
            require_if_set client github.com/calypr/syfon/apigen "$apigen_version"
          fi

          if [[ -n "$CLIENT_TAG" ]]; then
            require_if_set . github.com/calypr/syfon/client "$client_version"
          fi

          tidy_if_present apigen
          tidy_if_present client
          tidy_if_present .

          git add go.mod go.sum client/go.mod client/go.sum apigen/go.mod apigen/go.sum 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No module-version cleanup needed."
            exit 0
          fi

          git commit -m "chore: sync module versions after ${ROOT_TAG} [skip ci]"
          git push origin HEAD:development