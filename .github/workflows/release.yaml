# Cuts a GitHub release on every successful CI run on development, and also
# on manual semver/rc tag pushes. Avoids the GITHUB_TOKEN two-hop problem by
# computing the tag in a `prepare` job and passing it as an output to the
# subsequent build/release jobs within the same workflow run.

name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_run:
    workflows:
      - Syfon CI
    types:
      - completed
    branches:
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  # ── Prepare ───────────────────────────────────────────────────────────────
  # On a tag push: resolve the existing tag.
  # On workflow_run: bump the patch version, create + push the tag, then pass
  # it downstream so build/release can run in this same workflow run.
  # Tags pushed by GITHUB_TOKEN don't re-trigger workflows, so we can't rely
  # on a second workflow invocation — we do everything in one shot instead.
  prepare:
    name: Prepare release tag
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.version.outputs.sha }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve or compute tag
        id: version
        env:
          HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # On a manual tag push just use what was pushed.
          if [[ "$EVENT_NAME" == 'push' ]]; then
            echo "tag=$REF_NAME"   >> "$GITHUB_OUTPUT"
            echo "sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
            echo "Using existing tag: $REF_NAME"
            exit 0
          fi

          # workflow_run path — auto-tag the head commit.
          if git tag --points-at "$HEAD_SHA" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            existing=$(git tag --points-at "$HEAD_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            echo "tag=$existing"   >> "$GITHUB_OUTPUT"
            echo "sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
            echo "Head commit already tagged: $existing"
            exit 0
          fi

          latest=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)

          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            base="${latest#v}"
            IFS=. read -r major minor patch <<<"$base"
            patch=$((10#$patch + 1))
            if [[ $patch -gt 9 ]]; then
              patch=0; minor=$((10#$minor + 1))
              if [[ $minor -gt 9 ]]; then minor=0; major=$((10#$major + 1)); fi
            fi
            next="v${major}.${minor}.${patch}"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" "$HEAD_SHA" -m "Release $next"
          git push origin "$next"
          echo "Tagged $next"

          echo "tag=$next"       >> "$GITHUB_OUTPUT"
          echo "sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare]
    if: needs.prepare.outputs.tag != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: amd64, runner: ubuntu-latest      }
          - { os: linux,  arch: arm64, runner: ubuntu-24.04-arm   }
          - { os: darwin, arch: amd64, runner: macos-latest       }
          - { os: darwin, arch: arm64, runner: macos-latest       }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_UPSTREAM: ${{ github.server_url }}/${{ github.repository }}
        run: |
          CGO_ENABLED=1 make build
          mv syfon syfon-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syfon-${{ matrix.os }}-${{ matrix.arch }}
          path: syfon-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.tag != ''

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: syfon-*
          merge-multiple: true

      - name: Package archives and checksums
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          cd dist
          for binary in syfon-linux-* syfon-darwin-*; do
            [[ -f "$binary" ]] || continue
            archive="${binary}-${RELEASE_TAG}.tar.gz"
            # Rename to plain "syfon" inside the archive so the install script
            # can extract and mv syfon $DEST without any platform-specific logic.
            cp "$binary" syfon
            tar -czf "$archive" syfon
            rm syfon
          done
          sha256sum *.tar.gz > "syfon-${RELEASE_TAG}-checksums.txt"
          ls -lh

      - name: Generate changelog
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          prev=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p' || true)
          if [[ -n "${prev}" ]]; then
            notes=$(git log "${prev}".."${RELEASE_TAG}" --pretty=format:'- %s (%h)' --no-merges)
          else
            notes=$(git log "${RELEASE_TAG}" --pretty=format:'- %s (%h)' --no-merges)
          fi
          echo "$notes" > release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
            exit 0
          fi
          flags=""
          if [[ "$RELEASE_TAG" =~ -rc\.[0-9]+$ ]]; then
            flags="--prerelease"
          fi
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            dist/*.tar.gz \
            "dist/syfon-${RELEASE_TAG}-checksums.txt"

      - name: Tag submodules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Bump cross-module require versions in go.mod files to match the new release.
          # apigen is consumed by both root and client; client is consumed by root.
          sed -i "s|github.com/calypr/syfon/apigen v[0-9][^ ]*|github.com/calypr/syfon/apigen ${RELEASE_TAG}|g" go.mod client/go.mod
          sed -i "s|github.com/calypr/syfon/client v[0-9][^ ]*|github.com/calypr/syfon/client ${RELEASE_TAG}|g" go.mod

          git add go.mod client/go.mod
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump cross-module requires to ${RELEASE_TAG} [skip ci]"
            git push origin HEAD:development
          fi

          TAG_SHA=$(git rev-parse HEAD)

          for prefix in apigen client; do
            subtag="${prefix}/${RELEASE_TAG}"

            if git rev-parse -q --verify "refs/tags/$subtag" >/dev/null; then
              echo "Submodule tag already exists: ${subtag}"
              continue
            fi

            git tag "$subtag" "$TAG_SHA"
            git push origin "$subtag"
            echo "Tagged ${subtag} at $TAG_SHA"
          done
