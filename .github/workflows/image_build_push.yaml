name: Build and publish syfon image

on:
  push:
  workflow_dispatch:

concurrency:
  group: syfon-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          BRANCH=$(echo "${GITHUB_REF#refs/*/}" | tr '/[:upper:]' '_[:lower:]')
          SHORT_SHA="${GITHUB_SHA::12}"
          REPO=quay.io/ohsu-comp-bio/syfon
          TAGS="$REPO:$BRANCH"$'\n'"$REPO:$BRANCH-$SHORT_SHA"$'\n'"$REPO:sha-$SHORT_SHA"
          if [[ "$BRANCH" == "main" ]]; then
            TAGS="$TAGS"$'\n'"$REPO:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
