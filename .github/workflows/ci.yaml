name: Syfon CI

on:
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: syfon-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Test and Vet
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: make test-unit

      - name: Run server endpoint router tests
        run: |
          go test ./cmd/server \
            -run 'Test(AllRegisteredEndpoints_WithMocks|RegisterAPIRoutes_StaticBeforeParamAcrossControllers|RegisterControllerRoutes_StaticBeforeParam)' \
            -v

      - name: Run coverage
        run: make coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            coverage/coverage.out
            coverage/coverage.txt
            coverage/coverage.html

      - name: Run go vet
        run: go vet ./...

  build-and-push:
    name: Build and publish syfon image
    runs-on: ubuntu-latest
    needs:
      - test
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          REPO=quay.io/ohsu-comp-bio/syfon
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            PR="${{ github.event.pull_request.number }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR=""
          fi

          SAFE_BRANCH=$(echo "$BRANCH" | tr '/[:upper:]' '_[:lower:]')

          {
            echo "tags<<EOF"
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              echo "$REPO:pr-$PR"
              echo "$REPO:pr-$PR-$SHORT_SHA"
              echo "$REPO:$SAFE_BRANCH"
            else
              echo "$REPO:$SAFE_BRANCH"
              echo "$REPO:$SAFE_BRANCH-$SHORT_SHA"
              if [[ "$SAFE_BRANCH" == "main" ]]; then
                echo "$REPO:latest"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max