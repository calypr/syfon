name: Syfon CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: syfon-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Test and Vet
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: make test-unit

      - name: Run server endpoint router tests
        run: |
          go test ./cmd/server \
            -run 'Test(AllRegisteredEndpoints_WithMocks|RegisterAPIRoutes_StaticBeforeParamAcrossControllers|RegisterControllerRoutes_StaticBeforeParam)' \
            -v

      - name: Run coverage
        run: make coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            coverage/coverage.out
            coverage/coverage.txt
            coverage/coverage.html

      - name: Run go vet
        run: go vet ./...

  integration-test:
    name: Docker Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Docker-backed MinIO E2E tests
        env:
          SYFON_E2E_DOCKER: 1
        run: |
          go test -v -run TestSyfonDocker ./cmd/...
  build-and-push:
    name: Build syfon
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        arch: [amd64, arm64]
    needs: [test]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # THIS replaces all your bash scripting for tags
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/ohsu-comp-bio/syfon
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          # We push by digest first so we can merge them in the next job
          outputs: type=image,name=quay.io/ohsu-comp-bio/syfon,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=syfon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=syfon-${{ matrix.arch }}

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          printf '%s\n' "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}.txt"
          
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-syfon-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and Tag
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-syfon-*
          merge-multiple: true

      - name: Docker meta (re-run for tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/ohsu-comp-bio/syfon
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        run: |
          set -euo pipefail
          mapfile -t digests < <(cat /tmp/digests/*.txt)
          docker buildx imagetools create $(echo $DOCKER_METADATA_OUTPUT_TAGS | xargs -n 1 echo -t) \
            $(printf 'quay.io/ohsu-comp-bio/syfon@%s ' "${digests[@]}")
