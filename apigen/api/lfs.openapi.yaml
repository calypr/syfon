openapi: 3.0.3
info:
  title: Git LFS API (DRS Server)
  version: 1.1.0
  description: |
    OpenAPI model spec for Git LFS-compatible endpoints implemented by drs-server.
    This includes standard Batch and Verify payload models plus drs-server extensions
    used for upload proxy and metadata staging.
servers:
  - url: /
tags:
  - name: lfs
paths:
  /info/lfs/objects/batch:
    post:
      tags:
        - lfs
      summary: Git LFS Batch API
      description: |
        Requests upload/download actions for one or more LFS objects.
        Successful responses are HTTP 200, with per-object errors in `objects[].error`.
      operationId: lfsBatch
      requestBody:
        required: true
        content:
          application/vnd.git-lfs+json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
      responses:
        '200':
          description: Batch response (success and per-object errors)
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '401':
          description: Authentication required
          headers:
            LFS-Authenticate:
              $ref: '#/components/headers/LFSAuthenticate'
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '403':
          description: Forbidden for requested operation
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '404':
          description: Repository not found
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '406':
          description: Unsupported Accept header
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '413':
          description: Request too large
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '422':
          description: Validation failed for request payload
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '429':
          description: Rate limited
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '500':
          description: Internal server error
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '502':
          description: Bad gateway
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '504':
          description: Gateway timeout
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '507':
          description: Insufficient storage
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '509':
          description: Bandwidth limit exceeded
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
  /info/lfs/verify:
    post:
      tags:
        - lfs
      summary: Git LFS Verify API
      description: |
        Verifies uploaded object state. In drs-server this may consume staged metadata
        and complete object registration if needed.
      operationId: lfsVerify
      requestBody:
        required: true
        content:
          application/vnd.git-lfs+json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
      responses:
        '200':
          description: Verified
        '400':
          description: Invalid payload
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '401':
          description: Authentication required
          headers:
            LFS-Authenticate:
              $ref: '#/components/headers/LFSAuthenticate'
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '403':
          description: Forbidden
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '404':
          description: Not found
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '500':
          description: Internal server error
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
  /info/lfs/objects/metadata:
    post:
      tags:
        - lfs
      summary: Stage metadata for deferred object registration (drs-server extension)
      operationId: lfsStageMetadata
      requestBody:
        required: true
        content:
          application/vnd.git-lfs+json:
            schema:
              $ref: '#/components/schemas/MetadataSubmitRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataSubmitRequest'
      responses:
        '200':
          description: Metadata staged successfully
          content:
            application/vnd.git-lfs+json:
              schema:
                $ref: '#/components/schemas/MetadataSubmitResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataSubmitResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '401':
          description: Authentication required
          headers:
            LFS-Authenticate:
              $ref: '#/components/headers/LFSAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LFSErrorResponse'
  /info/lfs/objects/{oid}:
    put:
      tags:
        - lfs
      summary: Upload object bytes via drs-server upload proxy (drs-server extension)
      operationId: lfsUploadProxy
      parameters:
        - name: oid
          in: path
          required: true
          schema:
            type: string
          description: sha256 object identifier
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Upload accepted
        '400':
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Authentication required
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
        '502':
          description: Upstream storage error
          content:
            text/plain:
              schema:
                type: string
        '507':
          description: Insufficient storage for upload
          content:
            text/plain:
              schema:
                type: string
components:
  headers:
    LFSAuthenticate:
      description: |
        Authentication challenge for Git LFS clients.
        If omitted, clients commonly assume Basic authentication.
      schema:
        type: string
      example: Basic realm="Git LFS"
  schemas:
    BatchRequest:
      type: object
      required:
        - operation
        - objects
      properties:
        operation:
          type: string
          enum:
            - upload
            - download
        transfers:
          type: array
          items:
            type: string
        ref:
          $ref: '#/components/schemas/RefSpec'
        objects:
          type: array
          items:
            $ref: '#/components/schemas/BatchRequestObject'
          minItems: 1
        hash_algo:
          type: string
          default: sha256
    RefSpec:
      type: object
      properties:
        name:
          type: string
          description: Fully-qualified server refspec
    BatchRequestObject:
      type: object
      required:
        - oid
        - size
      properties:
        oid:
          type: string
        size:
          type: integer
          format: int64
          minimum: 0
    BatchResponse:
      type: object
      required:
        - objects
      properties:
        transfer:
          type: string
        objects:
          type: array
          items:
            $ref: '#/components/schemas/BatchResponseObject'
        hash_algo:
          type: string
          default: sha256
    BatchResponseObject:
      type: object
      required:
        - oid
        - size
      properties:
        oid:
          type: string
        size:
          type: integer
          format: int64
          minimum: 0
        authenticated:
          type: boolean
        actions:
          $ref: '#/components/schemas/BatchActions'
        error:
          $ref: '#/components/schemas/ObjectError'
    BatchActions:
      type: object
      properties:
        download:
          $ref: '#/components/schemas/Action'
        upload:
          $ref: '#/components/schemas/Action'
        verify:
          $ref: '#/components/schemas/Action'
    Action:
      type: object
      required:
        - href
      properties:
        href:
          type: string
          format: uri
        header:
          type: object
          additionalProperties:
            type: string
        expires_in:
          type: integer
          format: int32
          minimum: -2147483647
          maximum: 2147483647
        expires_at:
          type: string
          format: date-time
          description: RFC3339 timestamp
    ObjectError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Object-level error code (commonly HTTP-like status code)
        message:
          type: string
    VerifyRequest:
      type: object
      required:
        - oid
        - size
      properties:
        oid:
          type: string
        size:
          type: integer
          format: int64
          minimum: 0
    LFSErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        request_id:
          type: string
        documentation_url:
          type: string
          format: uri
    MetadataSubmitRequest:
      type: object
      required:
        - candidates
      properties:
        candidates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DrsObjectCandidate'
        ttl_seconds:
          type: integer
          format: int64
          minimum: 1
    MetadataSubmitResponse:
      type: object
      required:
        - staged
      properties:
        staged:
          type: integer
          format: int32
          minimum: 0
    DrsObjectCandidate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
          format: int64
          minimum: 0
        checksums:
          type: array
          items:
            $ref: '#/components/schemas/Checksum'
        access_methods:
          type: array
          items:
            $ref: '#/components/schemas/AccessMethod'
        aliases:
          type: array
          items:
            type: string
        mime_type:
          type: string
        description:
          type: string
    Checksum:
      type: object
      required:
        - type
        - checksum
      properties:
        type:
          type: string
        checksum:
          type: string
    AccessMethod:
      type: object
      properties:
        type:
          type: string
        access_id:
          type: string
        access_url:
          $ref: '#/components/schemas/AccessMethodAccessUrl'
        region:
          type: string
        authorizations:
          $ref: '#/components/schemas/AccessMethodAuthorizations'
    AccessMethodAccessUrl:
      type: object
      properties:
        url:
          type: string
    AccessMethodAuthorizations:
      type: object
      properties:
        bearer_auth_issuers:
          type: array
          items:
            type: string
