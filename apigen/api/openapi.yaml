        - cloud: "aws, gcp, or azure"
          access_url:
            headers:
            - "Authorization: Basic Z2E0Z2g6ZHJz"
            url: url
          available: true
          authorizations:
            passport_auth_issuers:
            - passport_auth_issuers
            - passport_auth_issuers
            bearer_auth_issuers:
            - bearer_auth_issuers
            - bearer_auth_issuers
