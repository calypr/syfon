components:
  parameters:
    Checksum:
      x-go-name: ChecksumParam
  schemas:
    DRSPage:
      type: object
      required:
        - drs_objects
      properties:
        drs_objects:
          type: array
          items:
            $ref: '#/components/schemas/DrsObject'
    AccessMethod:
      properties:
        access_url:
          type: object
          required: [url]
          properties:
            url: { type: string, description: "A fully resolvable URL that can be used to fetch the actual object bytes." }
            headers: { type: array, items: { type: string }, description: "GA4GH-compatible list of HTTP headers." }
        authorizations:
          type: object
          description: >-
            A map of organization to project list. An empty array means org-wide access.
            A non-empty array grants access scoped to the listed projects.
          additionalProperties:
            type: array
            items:
              type: string
    UploadMethod:
      properties:
        access_url:
          type: object
          required: [url]
          properties:
            url: { type: string, description: "Inlined Upload URL context." }
            headers: { type: array, items: { type: string }, description: "Inlined Upload Headers." }
