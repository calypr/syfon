components:
  schemas:
    AccessMethod:
      properties:
        access_url:
          type: object
          required: [url]
          properties:
            url: { type: string, description: "A fully resolvable URL that can be used to fetch the actual object bytes." }
            headers: { type: array, items: { type: string }, description: "GA4GH-compatible list of HTTP headers." }
        authorizations:
          type: object
          properties:
            drs_object_id: { type: string }
            supported_types: { type: array, items: { type: string } }
            passport_auth_issuers: { type: array, items: { type: string } }
            bearer_auth_issuers: { type: array, items: { type: string } }
    UploadMethod:
      properties:
        access_url:
          type: object
          required: [url]
          properties:
            url: { type: string, description: "Inlined Upload URL context." }
            headers: { type: array, items: { type: string }, description: "Inlined Upload Headers." }
