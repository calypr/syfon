  - name: Motivation
    description: |
      <table style="width:100%">
        <tr>
          <td style="width:40%">
            Data sharing requires portable data, consistent with the FAIR data principles (findable, accessible, interoperable, reusable). Today’s researchers and clinicians are surrounded by potentially useful data, but often need bespoke tools and processes to work with each dataset. Today’s data publishers don’t have a reliable way to make their data useful to all (and only) the people they choose. And today’s data controllers are tasked with implementing standard controls of non-standard mechanisms for data access.
          </td>
          <td style="width:60%">
              <img src="/data-repository-service-schemas/public/img/figure1.png">
              <em>
                Figure 1: there’s an ocean of data, with many different tools to drink from it, but no guarantee that any tool will work with any subset of the data
              </em>
          </td>
        </tr>
      </table>

      <table style="width:100%">
        <tr>
          <td style="width:40%">
            We need a standard way for data producers to make their data available to data consumers, that supports the control needs of the former and the access needs of the latter. And we need it to be interoperable, so anyone who builds access tools and systems can be confident they’ll work with all the data out there, and anyone who publishes data can be confident it will work with all the tools out there.
          </td>
          <td style="width:60%">
              <img src="/data-repository-service-schemas/public/img/figure2.png">
              <em>
                Figure 2: by defining a standard Data Repository API, and adapting tools to use it, every data publisher can now make their data useful to every data consumer
              </em>
          </td>
        </tr>
      </table>

      <table style="width:100%">
        <tr>
          <td style="width:75%">
            We envision a world where:
            <ul>
              <li>
                there are many many <strong>data consumers</strong>, working in research and in care, who can use the tools of their choice to access any and all data that they have permission to see
              </li>
              <li>
                there are many <strong>data access tools</strong> and platforms, supporting discovery, visualization, analysis, and collaboration
              </li>
              <li>
                there are many <strong>data repositories</strong>, each with their own policies and characteristics, which can be accessed by a variety of tools
              </li>
              <li>
                there are many <strong>data publishing tools</strong> and platforms, supporting a variety of data lifecycles and formats
              </li>
              <li>
                there are many many <strong>data producers</strong>, generating data of all types, who can use the tools of their choice to make their data as widely available as is appropriate
              </li>
            </ul>
          </td>
          <td style="width:25%">
              <img src="/data-repository-service-schemas/public/img/figure3.png">
              <em>
                Figure 3: a standard Data Repository API enables an ecosystem of data producers and consumers
              </em>
          </td>
        </tr>
      </table>

      This spec defines a standard **Data Repository Service (DRS) API** (“the yellow box”), to enable that ecosystem of data producers and consumers. Our goal is that the only thing data consumers need to know about a data repo is *\"here’s the DRS endpoint to access it\"*, and the only thing data publishers need to know to tap into the world of consumption tools is *\"here’s how to tell it where my DRS endpoint lives\"*.

      ## Federation

      The world’s biomedical data is controlled by groups with very different policies and restrictions on where their data lives and how it can be accessed. A primary purpose of DRS is to support unified access to disparate and distributed data. (As opposed to the alternative centralized model of "let’s just bring all the data into one single data repository”, which would be technically easier but is no more realistic than “let’s just bring all the websites into one single web host”.)

      In a DRS-enabled world, tool builders don’t have to worry about where the data their tools operate on lives — they can count on DRS to give them access. And tool users only need to know which DRS server is managing the data they need, and whether they have permission to access it; they don’t have to worry about how to physically get access to, or (worse) make a copy of the data. For example, if I have appropriate permissions, I can run a pooled analysis where I run a single tool across data managed by different DRS servers, potentially in different locations.
  - name: Working With Compound Objects
    description: |
      ## Compound Objects

      The DRS API supports access to data objects, with each `DrsObject` representing a single opaque blob of bytes. Much content (e.g. VCF files) is well represented as a single atomic `DrsObject`. Some content, however (e.g. DICOM images) is best represented as a compound object consisting of a structured collection of atomic `DrsObject`s. In both cases, DRS isn't aware of the semantics of the objects it serves -- understanding those semantics is the responsibility of the applications that call DRS.

      Common examples of compound objects in biomedicine include:
      * BAM+BAI genomic reads, with a small index (the BAI object) to large data (the BAM object), each object using a well-defined file format.
      * DICOM images, with a contents object pointing to one or more raw image objects, each containing pixels from different aspects of a single logical biomedical image (e.g. different z-coordinates)
      * studies, with a single table of contents listing multiple objects of various types that were generated together and are meant to be processed together

      ## Best Practice: Manifests

      As with atomic objects, DRS applications and servers are expected to agree on the semantics of compound objects using non-DRS mechanisms. The recommended best practice for representing a particular compound object type is:
      1. Define a manifest file syntax, which contains the DRS IDs of the constituent atomic objects, plus type-specific information about the relationship between those constituents.
          * Manifest file syntax isn't prescribed by the spec, but we expect they will often be JSON files.
          * For example, for a BAM+BAI pair the manifest file could contain two key-value pairs mapping the type of each constituent file to its DRS ID.
      3. Make manifest objects and their constituent objects available using standard DRS mechanisms -- each object is referenced via its own DRS ID, just like any other atomic object.
          * For example, for a BAM+BAI pair, there would be three DRS IDs -- one for the manifest, one for the BAM, and one for the BAI.
      5. Document the expected client logic for processing compound objects of interest. This logic typically consists of using standard DRS mechanisms to fetch the manifest, parsing its syntax, extracting the DRS IDs of constituent objects, and using standard DRS mechanisms to fetch the constituents as needed.
          * In some cases the application will always want to fetch all of the constituents; in other cases it may want to initially fetch a subset, and only fetch the others on demand. For example, a DICOM image viewer may only want to fetch the layers that are being rendered.
  - name: Background Notes on DRS URIs
    description: |
      ## Design Motivation

      DRS URIs are aligned with the [FAIR data principles](https://www.nature.com/articles/sdata201618) and the [Joint Declaration of Data Citation Principles](https://www.nature.com/articles/sdata20182) — both hostname-based and compact identifier-based URIs provide globally unique, machine-resolvable, persistent identifiers for data.

      * We require all URIs to begin with `drs://` as a signal to humans and systems consuming these URIs that the response they will ultimately receive, after transforming the URI to a fetchable URL, will be a DRS JSON packet. This signal differentiates DRS URIs from the wide variety of other entities (HTML documents, PDFs, ontology notes, etc.) that can be represented by compact identifiers.
      * We support hostname-based URIs because of their simplicity and efficiency for server and client implementers.
      * We support compact identifier-based URIs, and the meta-resolver services of identifiers.org and n2t.net (Name-to-Thing), because of the wide adoption of compact identifiers in the research community. as detailed by [Wimalaratne et al (2018)](https://www.nature.com/articles/sdata201829) in "Uniform resolution of compact identifiers for biomedical data."
  - name: Compact Identifier-Based URIs
    description: |
      **Note: Identifiers.org/n2t.net API Changes**

      The examples below show the current API interactions with [n2t.net](https://n2t.net/e/compact_ids.html) and [identifiers.org](https://docs.identifiers.org/) which may change over time. Please refer to the documentation from each site for the most up-to-date information. We will make best efforts to keep the DRS specification current but DRS clients MUST maintain their ability to use either the identifiers.org or n2t.net APIs to resolve compact identifier-based DRS URIs.

      ## Registering a DRS Server on a Meta-Resolver

      See the documentation on the [n2t.net](https://n2t.net/e/compact_ids.html) and [identifiers.org](https://docs.identifiers.org/) meta-resolvers for adding your own compact identifier type and registering your DRS server as a resolver. You can register new prefixes (or mirrors by adding resource provider codes) for free using a simple online form. For more information see [More Background on Compact Identifiers](./more-background-on-compact-identifiers.html).

      ## Calling Meta-Resolver APIs for Compact Identifier-Based DRS URIs

      Clients resolving Compact Identifier-based URIs need to convert a prefix (e.g. “drs.42”) into a URL pattern. They can do so by calling either the identifiers.org or the n2t.net API, since the two meta-resolvers keep their mapping databases in sync.

      ### Calling the identifiers.org API as a Client

      It takes two API calls to get the URL pattern.

      1. The client makes a GET request to identifiers.org to find information about the prefix:

      ```
      GET https://registry.api.identifiers.org/restApi/namespaces/search/findByPrefix?prefix=drs.42
      ```

      This request returns a JSON structure including various URLs containing an embedded namespace id, such as:

      ```
      "namespace" : {
        "href":"https://registry.api.identifiers.org/restApi/namespaces/1234"
      }
      ```

      2. The client extracts the namespace id (in this example 1234), and uses it to make a second GET request to identifiers.org to find information about the namespace:

      ```
      GET https://registry.api.identifiers.org/restApi/resources/search/findAllByNamespaceId?id=1234
      ```

      This request returns a JSON structure including an urlPattern field, whose value is a URL pattern containing a ${id} parameter, such as:

      ```
      "urlPattern" : "https://drs.myexample.org/ga4gh/drs/v1/objects/{$id}"
      ```

      ### Calling the n2t.net API as a Client

      It takes one API call to get the URL pattern.

      The client makes a GET request to n2t.net to find information about the namespace. (Note the trailing colon.)

      ```
      GET https://n2t.net/drs.42:
      ```

      This request returns a text structure including a redirect field, whose value is a URL pattern containing an `$id` parameter, such as:

      ```
      redirect: https://drs.myexample.org/ga4gh/drs/v1/objects/$id
      ```

      ## Caching with Compact Identifiers

      Identifiers.org/n2t.net compact identifier resolver records do not change frequently. This reality is useful for caching resolver records and their URL patterns for performance reasons. Builders of systems that use compact identifier-based DRS URIs should cache prefix resolver records from identifiers.org/n2t.net and occasionally refresh the records (such as every 24 hours). This approach will reduce the burden on these community services since we anticipate many DRS URIs will be regularly resolved in workflow systems. Alternatively, system builders may decide to directly mirror the registries themselves, instructions are provided on the identifiers.org/n2t.net websites.

      ## Security with Compact Identifiers

      As mentioned earlier, identifiers.org/n2t.net performs some basic verification of new prefixes and provider code mirror registrations on their sites. However, builders of systems that consume and resolve DRS URIs may have certain security compliance requirements and regulations that prohibit relying on an external site for resolving compact identifiers. In this case, systems under these security and compliance constraints may wish to whitelist certain compact identifier resolvers and/or vet records from identifiers.org/n2t.net before enabling in their systems.

      ## Accession Encoding to Valid DRS IDs

      The compact identifier format used by identifiers.org/n2t.net does not percent-encode reserved URI characters but, instead, relies on the first ":" character to separate prefix from accession. Since these accessions can contain any characters, and characters like "/" will interfere with DRS API calls, you *must* percent encode the accessions extracted from DRS compact identifier-based URIs when using as DRS IDs in subsequent DRS GET requests. An easy way for a DRS client to handle this is to get the initial DRS object JSON response from whatever redirects the compact identifier resolves to, then look for the `self_uri` in the JSON, which will give you the correctly percent-encoded DRS ID for subsequent DRS API calls such as the `access` method.

      ## Additional Examples

      For additional examples, see the document [More Background on Compact Identifiers](./more-background-on-compact-identifiers.html).
  - name: Hostname-Based URIs
    description: |
      ## Encoding DRS IDs

      In hostname-based DRS URIs, the ID is always percent-encoded to ensure special characters do not interfere with subsequent DRS endpoint calls. As such, ":" is not allowed in the URI and is a convenient way of differentiating from a compact identifier-based DRS URI. Also, if a given DRS service implementation uses compact identifier accessions as their DRS IDs, they must be percent encoded before using them as DRS IDs in hostname-based DRS URIs and subsequent GET requests to a DRS service endpoint.
  - name: GA4GH Service Registry
    description: |
      The [GA4GH Service Registry API specification](https://github.com/ga4gh-discovery/ga4gh-service-registry) allows information about GA4GH-compliant web services, including DRS services, to be aggregated into registries and made available via a standard API. The following considerations should be followed when registering DRS services within a service registry.

      * The DRS service attributes returned by `/service-info` (i.e. `id`, `name`, `description`, etc.) should have the same values as the registry entry for that service.
      * The value of the `type` object's `artifact` property should be `drs` (i.e. the same as it appears in `service-info`)
      * Each entry in a Service Registry must have a `url`, indicating the base URL to the web service. For DRS services, the registered `url` must include everything up to
      the standardized `/ga4gh/drs/v1` path. Clients should be able to assume that:
          + Adding `/ga4gh/drs/v1/objects/{object_id}` to the registered `url` will hit the `DrsObject` endpoint
          + Adding `/ga4gh/drs/v1/service-info` to the registered `url` will hit the Service Info endpoint

      Example listing of a DRS API registration from a service registry's `/services` endpoint:

      ```
      [
          {
              "id": "com.example.drs",
              "name": "Example DRS API",
              "type": {
                  "group": "org.ga4gh",
                  "artifact": "drs",
                  "version": "1.5.0"
              },
              "description": "The Data Repository Service (DRS) API ...",
              "organization": {
                  "id": "com.example",
                  "name": "Example Company"
              },
              "contactUrl": "mailto:support@example.com",
              "documentationUrl": "https://docs.example.com/docs/drs",
              "createdAt": "2021-08-09T00:00:00Z",
              "updatedAt": "2021-08-09T12:30:00Z",
              "environment": "production",
              "version": "1.13.4",
              "url": "https://drs-service.example.com"
          }
      ]
      ```
  - name: Upload Requests and Object Registration
    description: "# Upload Requests and Object Registration\n\n> **Optional Functionality**: Upload and object registration are optional DRS extensions. Clients should check `/service-info` for `uploadRequestSupported` and `objectRegistrationSupported` before attempting to use these endpoints.\n\nThe DRS upload and object registration endpoints allows clients to negotiate with servers on mutually convenient storage backends and then register uploads as DRS objects through a three-phase workflow:\n\n1. **Request Upload URLs**: POST `/upload-request` with file metadata to receive upload methods and credentials\n2. **Upload Files**: Use returned URLs and credentials to upload files to storage using existing upload mechanisms. DRS is not involved in this step at all, DRS simply enables clients and servers to agree on a mutually convenient storage service.\n3. **Register Objects**: POST `/objects/register` to register \"candidate\" DRS objects with the server\n\nThis approach separates storage service and credential negotiation from file transfer and object registration, supporting a vendor-neutral means of sharing data in a DRS network.\n\nThe `/objects/register` endpoint can be used independently to register existing data without using the `/upload-request` endpoint, and servers can choose to only support object registration and not file uploads by setting the `uploadRequestSupported` and `objectRegistrationSupported` flags appropriately in `/service-info`.\n\nUpload requests and object registration endpoints only support bulk requests to simplify implementation and reflect real-world usage patterns. Bioinformatics workflows often involve uploading multiple related files together (e.g., BAM and VCF files with their indices, or analysis result sets), making bulk operations a natural fit. Single files/objects are handled as lists with one element. Implementations of the `/objects/register` endpoint SHOULD implement transaction semantics so that either all of the objects are successfully registered or none of them are, and clients should be robust to this behaviour. Transaction semantics for the `/upload-request` are encouraged but not required due to the variety and complexity of data transfer technologies.\n\nThe `/upload-request` endpoint does not require any state to be maintained on the DRS server (intermediate DRS object IDs etc.) it is simply a means for a server to provide details of where a client can upload data, and it should ensure that it trusts the client before providing such details. This means that if uploads fail and there is no later call to `/objects/register` there is no DRS state to manage, simplifying server implementation.\n\nServers SHOULD ensure that any data from unsuccessful uploads (e.g. incomplete multi-part uploads) are cleaned up, for example by using lifecycle configuration in the backend storage. There is _no_ means of requiring that a client ultimately registers a DRS object pointing at data uploaded, and so servers should consider implementing some form of storage \"garbage\" collection (or simply set a short lifecycle policy on the upload location and move uploaded data that is later registered as DRS objects to other locations, updating the `access_method`s accordingly). Servers should also implement some means of constraining upload size (quotas etc.) to protect against accidental or malicious unconstrained uploads.\n\nThe `/upload-request` endpoint can return one or more `upload_method`s of different types for each requested file, and backend specific details such as bucket names, object keys and credentials are supplied in a generic `upload_details` field. A straightforward implementation might return an single time-limited pre-signed POST URL as the `post_url` for an `upload_method` of type `https` which incorporates authentication into the URL, but because DRS is often used for large files such as BAMs and CRAMs we also want to support more sophisticated upload approaches implemented by storage backends such as multi-part uploads, automatic retries etc. The `upload_details` field can also be used to include bucket names, keys and temporary credentials that can be used in native clients and SDKs. This offers a natural way to adapt this protocol to new storage technologies. Refer to the examples below for some suggested implementations.\n\n## Service Discovery\n\nCheck `/service-info` for upload capabilities:\n\n```json\n{\n  \"drs\": {\n    \"uploadRequestSupported\": true,\n    \"objectRegistrationSupported\": true,\n    \"supportedUploadMethods\": [\"s3\", \"https\", \"gs\"],\n    \"maxUploadSize\": 5368709120,\n    \"maxUploadRequestLength\": 50,\n    \"maxRegisterRequestLength\": 50,\n    \"validateUploadChecksums\": true,\n    \"validateUploadFileSizes\": false,\n    \"relatedFileStorageSupported\": true\n  }\n}\n```\n\nUpload related fields:\n\n- `uploadRequestSupported`: Upload request operations available via `/upload-request`\n- `objectRegistrationSupported`: Object registration operations available via `/objects/register`\n- `supportedUploadMethods`: Available storage backends  \n- `maxUploadSize`: File size limit (bytes)\n- `maxUploadRequestLength`: Files per request limit for upload requests\n- `maxRegisterRequestLength`: Candidate objects per request limit for registration\n- `validateUploadChecksums`/`validateUploadFileSizes`: Server validation behavior\n- `relatedFileStorageSupported`: Files from same upload request stored under common prefixes\n\n## Upload Methods\n\nUpon receipt of a request for an upload method for a specific file, the server will respond with one or more `upload_method` with associated `type` and corresponding `upload_details` with upload locations, temporary credentials etc. These details are specific to backend implementations.\n\nExample storage backends:\n\n- **https**: Presigned POST URLs for HTTP uploads\n- **s3**: Direct S3 upload with temporary AWS credentials\n- **gs**: Google Cloud Storage with OAuth2 tokens\n- **ftp/sftp**: Traditional file transfer protocols using negotiated credentials\n\nServers may return a subset of advertised methods based on file characteristics, for example they may choose to store large objects such as WGS BAM files in different backends to small csv files.\n\n## Related File Storage (Optional)\n\nServers MAY support storing files from the same upload request under common prefixes, enabling bioinformatics workflows that expect co-located files:\n\n- **CRAM + CRAI**: Alignment files with index files\n- **VCF + TBI**: Variant files with tabix indexes  \n- **FASTQ.ora + ORADATA.tar.gz**: Compressed files with associated reference data\n\nCheck `relatedFileStorageSupported` in service-info or examine upload URLs for common prefixes.\n\n## Object Registration\n\nAfter upload, clients can register files in bulk as DRS objects using POST `/objects/register`. Registration is all-or-nothing. If any candidate object fails to be registered in the server, the entire request fails and no objects are registered.\n\n**Candidate DRS object equirements**:\n\n- Complete metadata (name, size, checksums, MIME type)\n- Access methods pointing to file locations  \n- Valid authorization (if required)\n- Do not include server-generated fields (id, self_uri, timestamps)\n\nUpon receipt of candidate objects for registration the server will create unique object IDs and returns complete DRS objects. Note that the server is not obliged to retain the clients supplied `access_method`s and is free to move data to different locations/backends once the object is registered. This means that a server can choose to receive uploads in a dedicated \"dropzone\", with hard quotas and additional security, and then move them to more permanent storage once the DRS object is registered. Clients SHOULD NOT cache the response from `/objects/register` as the `access_method`s might change after registration.\n\nThe `/objects/register` endpoint can also be used independently to register existing data that is already stored in accessible locations, without using the `/upload-request` workflow. This is useful for registering pre-existing datasets or files uploaded through other means. Servers may choose only to support registration and not uploads, and should advertise this in `/service-info`\n\n## Authentication & Validation\n\n**Authentication**: Supports GA4GH Passports, Basic auth, and Bearer tokens.\n\n**Checksums**: Required for all files (SHA-256, MD5, or IANA-registered algorithms). Servers MAY validate checksums and file sizes as advertised in service-info flags.\n\n## Error Handling\n\n**Client Errors (4xx)**:\n\n- Invalid metadata (400)\n- Missing auth (401)\n- Insufficient permissions (403)\n\n**Server Errors (5xx)**:\n\n- Storage unavailable (500)\n- Capacity limits (503)\n\n## Best Practices\n\n**Clients**: Check service-info first, calculate checksums, be robust to failed object registration\n**Servers**: Use short-lived tightly scoped credentials, support multiple upload methods, implement rate limiting, ensure unique storage backend names to avoid inadvertent overwrites (e.g. using UUIDs), ensure that quotas are enforced and incomplete or unregistered uploads are deleted\n**Security**: Time-limited credentials, single-use URLs, logging for audit\n\n## Security Considerations\n\n**Credential Scoping**: Implementers SHOULD scope upload credentials to the minimum necessary permissions and duration. Credentials should:\n\n- Allow write access only to the specific upload URL/path provided\n- Have the shortest practical expiration time (e.g. 15 minutes to 1 hour)\n- Be restricted to the specific file size and content type when possible\n- Not grant broader storage access beyond the intended upload location\n\nThis principle of least privilege reduces security exposure if credentials are compromised or misused.\n\n## Example Workflows\n\n### Simple HTTPS Upload\n\nUpload Request:\n\n```http\nPOST /upload-request\nContent-Type: application/json\n\n{\n  \"requests\": [\n    {\n      \"name\": \"variants.vcf\",\n      \"size\": 52428800,\n      \"mime_type\": \"text/plain\",\n      \"checksums\": [\n        {\n          \"checksum\": \"5d41402abc4b2a76b9719d911017c592\",\n          \"type\": \"md5\"\n        }\n      ]\n    }\n  ]\n}\n```\n\nResponse:\n\n```json\n{\n  \"responses\": [\n    {\n      \"name\": \"variants.vcf\",\n      \"size\": 52428800,\n      \"mime_type\": \"text/plain\",\n      \"checksums\": [\n        {\n          \"checksum\": \"5d41402abc4b2a76b9719d911017c592\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"upload_methods\": [\n        {\n          \"type\": \"https\",\n          \"access_url\": {\n            \"url\": \"https://uploads.example.org/variants.vcf\"\n          },\n          \"upload_details\": {\n            \"post_url\": \"https://uploads.example.org/presigned-upload?signature=FAKE_SIG\"\n          }\n        }\n      ]\n    }\n  ]\n}\n```\n\nUpload via HTTPS:\n\n```bash\n# Simple PUT upload to presigned URL\ncurl -X PUT \"https://uploads.example.org/presigned-upload?signature=FAKE_SIG\" \\\n  --data-binary @variants.vcf\n```\n\nRegister DRS Object:\n\n```http\nPOST /objects/register\nContent-Type: application/json\n\n{\n  \"candidates\": [\n    {\n      \"name\": \"variants.vcf\",\n      \"size\": 52428800,\n      \"mime_type\": \"text/plain\",\n      \"checksums\": [\n        {\n          \"checksum\": \"5d41402abc4b2a76b9719d911017c592\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"access_methods\": [\n        {\n          \"type\": \"https\",\n          \"access_url\": {\n            \"url\": \"https://uploads.example.org/variants.vcf\"\n          }\n        }\n      ],\n      \"description\": \"Variant calls in VCF format\"\n    }\n  ]\n}\n```\n\nResponse:\n\n```json\n{\n  \"objects\": [\n    {\n      \"id\": \"drs_obj_f6e5d4c3b2a1\",\n      \"self_uri\": \"drs://drs.example.org/drs_obj_f6e5d4c3b2a1\",\n      \"name\": \"variants.vcf\",\n      \"size\": 52428800,\n      \"mime_type\": \"text/plain\",\n      \"created_time\": \"2024-01-15T10:45:00Z\",\n      \"updated_time\": \"2024-01-15T10:45:00Z\",\n      \"version\": \"1.0\",\n      \"checksums\": [\n        {\n          \"checksum\": \"5d41402abc4b2a76b9719d911017c592\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"access_methods\": [\n        {\n          \"type\": \"https\",\n          \"access_url\": {\n            \"url\": \"https://uploads.example.org/variants.vcf\"\n          }\n        }\n      ],\n      \"description\": \"Variant calls in VCF format\"\n    }\n  ]\n}\n```\n\n### S3 Bulk Upload (BAM + Index)\n\nRequest Upload Methods for Related Files\n\n```http\nPOST /upload-request\nContent-Type: application/json\n\n{\n  \"requests\": [\n    {\n      \"name\": \"sample.bam\",\n      \"size\": 1073741824,\n      \"mime_type\": \"application/octet-stream\",\n      \"checksums\": [\n        {\n          \"checksum\": \"d41d8cd98f00b204e9800998ecf8427e\",\n          \"type\": \"md5\"\n        }\n      ]\n    },\n    {\n      \"name\": \"sample.bam.bai\",\n      \"size\": 2097152,\n      \"mime_type\": \"application/octet-stream\",\n      \"checksums\": [\n        {\n          \"checksum\": \"098f6bcd4621d373cade4e832627b4f6\",\n          \"type\": \"md5\"\n        }\n      ]\n    }\n  ]\n}\n```\n\nResponse:\n\n```json\n{\n  \"responses\": [\n    {\n      \"name\": \"sample.bam\",\n      \"size\": 1073741824,\n      \"mime_type\": \"application/octet-stream\",\n      \"checksums\": [\n        {\n          \"checksum\": \"d41d8cd98f00b204e9800998ecf8427e\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"upload_methods\": [\n        {\n          \"type\": \"s3\",\n          \"access_url\": {\n            \"url\": \"s3://genomics-uploads/x7k9m/sample.bam\"\n          },\n          \"upload_details\": {\n            \"bucket\": \"genomics-uploads\",\n            \"key\": \"x7k9m/sample.bam\",\n            \"access_key_id\": \"FAKE_ACCESS_KEY_123\",\n            \"secret_access_key\": \"FAKE_SECRET_KEY_456\",\n            \"session_token\": \"FAKE_SESSION_TOKEN_789\",\n            \"expires_at\": \"2024-01-15T12:00:00Z\"\n          }\n        }\n      ]\n    },\n    {\n      \"name\": \"sample.bam.bai\",\n      \"size\": 2097152,\n      \"mime_type\": \"application/octet-stream\",\n      \"checksums\": [\n        {\n          \"checksum\": \"098f6bcd4621d373cade4e832627b4f6\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"upload_methods\": [\n        {\n          \"type\": \"s3\",\n          \"access_url\": {\n            \"url\": \"s3://genomics-uploads/x7k9m/sample.bam.bai\"\n          },\n          \"upload_details\": {\n            \"bucket\": \"genomics-uploads\",\n            \"key\": \"x7k9m/sample.bam.bai\",\n            \"access_key_id\": \"FAKE_ACCESS_KEY_123\",\n            \"secret_access_key\": \"FAKE_SECRET_KEY_456\",\n            \"session_token\": \"FAKE_SESSION_TOKEN_789\",\n            \"expires_at\": \"2024-01-15T12:00:00Z\"\n          }\n        }\n      ]\n    }\n  ]\n}\n```\n\nUpload Both Files to S3:\n\n```bash\n# Upload BAM and index files using the supplied credentials (note common prefix)\naws s3 cp sample.bam s3://genomics-uploads/x7k9m/sample.bam\naws s3 cp sample.bam.bai s3://genomics-uploads/x7k9m/sample.bam.bai\n```\n\nRegister Both DRS Objects:\n\n```http\nPOST /objects/register\nContent-Type: application/json\n\n{\n  \"candidates\": [\n    {\n      \"name\": \"sample.bam\",\n      \"size\": 1073741824,\n      \"mime_type\": \"application/octet-stream\",\n      \"checksums\": [\n        {\n          \"checksum\": \"d41d8cd98f00b204e9800998ecf8427e\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"access_methods\": [\n        {\n          \"type\": \"s3\",\n          \"access_id\": \"s3\",\n          \"access_url\": {\n            \"url\": \"s3://genomics-uploads/x7k9m/sample.bam\"\n          }\n        }\n      ],\n      \"description\": \"BAM alignment file\"\n    },\n    {\n      \"name\": \"sample.bam.bai\",\n      \"size\": 2097152,\n      \"mime_type\": \"application/octet-stream\",\n      \"checksums\": [\n        {\n          \"checksum\": \"098f6bcd4621d373cade4e832627b4f6\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"access_methods\": [\n        {\n          \"type\": \"s3\",\n          \"access_id\": \"s3\",\n          \"access_url\": {\n            \"url\": \"s3://genomics-uploads/x7k9m/sample.bam.bai\"\n          }\n        }\n      ],\n      \"description\": \"BAM index file\"\n    }\n  ]\n}\n```\n\nResponse:\n\n```json\n{\n  \"objects\": [\n    {\n      \"id\": \"drs_obj_a1b2c3d4e5f6\",\n      \"self_uri\": \"drs://drs.example.org/drs_obj_a1b2c3d4e5f6\",\n      \"name\": \"sample.bam\",\n      \"size\": 1073741824,\n      \"mime_type\": \"application/octet-stream\",\n      \"created_time\": \"2024-01-15T10:30:00Z\",\n      \"updated_time\": \"2024-01-15T10:30:00Z\",\n      \"version\": \"1.0\",\n      \"checksums\": [\n        {\n          \"checksum\": \"d41d8cd98f00b204e9800998ecf8427e\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"access_methods\": [\n        {\n          \"type\": \"s3\",\n          \"access_id\": \"s3\",\n          \"access_url\": {\n            \"url\": \"s3://genomics-uploads/x7k9m/sample.bam\"\n          }\n        }\n      ],\n      \"description\": \"BAM alignment file\"\n    },\n    {\n      \"id\": \"drs_obj_b2c3d4e5f6a1\",\n      \"self_uri\": \"drs://drs.example.org/drs_obj_b2c3d4e5f6a1\",\n      \"name\": \"sample.bam.bai\",\n      \"size\": 2097152,\n      \"mime_type\": \"application/octet-stream\",\n      \"created_time\": \"2024-01-15T10:30:00Z\",\n      \"updated_time\": \"2024-01-15T10:30:00Z\",\n      \"version\": \"1.0\",\n      \"checksums\": [\n        {\n          \"checksum\": \"098f6bcd4621d373cade4e832627b4f6\",\n          \"type\": \"md5\"\n        }\n      ],\n      \"access_methods\": [\n        {\n          \"type\": \"s3\",\n          \"access_id\": \"s3\",\n          \"access_url\": {\n            \"url\": \"s3://genomics-uploads/x7k9m/sample.bam.bai\"\n          }\n        }\n      ],\n      \"description\": \"BAM index file\"\n    }\n  ]\n}\n```\n"
  - name: Object Deletion
    description: "# Object Deletion\n\n> **Optional Functionality**: Delete support is an **optional** extension to the DRS API. Not all DRS servers are required to implement delete functionality. Clients should check for the availability of delete endpoints before attempting to use them.\n\nDRS delete functionality allows suitably authenticated clients to request that DRS objects are removed from the server and, optionally, to request that the server attempt to delete the underlying data.\n\nServers should ensure that they trust clients from whom they receive delete requests, and may choose to implement \"soft\" deletes to minimise the risk of accidental or malicious requests. The DRS specification does not currently provide explicit support for soft deletes. Because delete support is optional, servers operating in untrusted environments may choose not to support delete operations at all.\n\nIn combination with the `/objects/register` endpoint, metadata only delete requests offer a means for clients to update DRS metadata without affecting the underlying data, and without introducing additional update operations which would complicate server implementation.\n\nClients can express a preference that the underlying data referred to by the deleted DRS object(s) is deleted with the `delete_storage_data` parameter. Servers are free to interpret this as they choose, and can advertise whether they support it at all with the `deleteStorageDataSupported` flag. Servers that choose to attempt to honour the request need not perform this operation synchronously and may, for example, register the file for later deletion. Implementations may also choose to ensure that no other DRS object registered in the server refers to the underlying data before deleting. Servers may not have the necessary permissions to delete the data from the backend even if they would like to do so, or may encounter errors when they attempt deletion. In the case that a DRS object refers to data stored in multiple backends (e.g. has multiple `access_method`s) the server may attempt to delete the data from all or only some of the backends.\n\nFor these reasons clients MUST NOT depend on the server deleting the underlying storage data even if the server advertises that `deleteStorageDataSupported` and the client sets the `delete_storage_data` flag.\n\nIn situations where the DRS server controls the storage backend, DRS delete support offers a convenient vendor-neutral way for clients to update and delete DRS objects and corresponding data.\n\nFor bulk deletes using the `/objects/delete` endpoint the server SHOULD implement transaction semantics: if any object fails validation or deletion, the entire request should fail and no objects are deleted and no attempt is made to delete from underlying storage for any object.\n\n## Design principles\n\n- **Optional**: Delete support is completely optional\n- **Safety**: Preserves underlying data in storage unless explicitly requested\n- **Backward compatible**: No impact on existing DRS functionality\n- **Flexible authentication**: Supports GA4GH Passports, Bearer tokens, API keys\n- **Use POST rather than DELETE**: GA4GH Passports require request bodies, which DELETE methods don't reliably support across all HTTP infrastructure. POST ensures broad compatibility.\n\n## Service Discovery\n\nCheck `/service-info` for delete capabilities:\n\n```json\n{\n  \"drs\": {\n    \"uploadRequestSupported\": true,\n    \"objectRegistrationSupported\": true,\n    \"supportedUploadMethods\": [\"s3\", \"https\"],\n    \"relatedFileStorageSupported\": true,\n    \"deleteSupported\": true,\n    \"maxBulkDeleteLength\": 100,\n    \"deleteStorageDataSupported\": true\n  }\n}\n```\n\n- **`deleteSupported`**: Whether server supports deletion\n- **`maxBulkDeleteLength`**: Maximum objects per bulk delete request  \n- **`deleteStorageDataSupported`**: Whether server can attempt to delete underlying storage files\n\n### Single Object Delete: `POST /objects/{object_id}/delete`\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/drs_object_123456/delete\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"passports\": [\"...\"], \"delete_storage_data\": false}'\n# Response: 204 No Content (indicates metadata deletion success only)\n```\n\n**Note**: HTTP responses indicate metadata deletion status only. Storage deletion (`delete_storage_data: true`) is a best effort attempt with no guarantee of success.\n\n### Bulk Object Delete: `POST /objects/delete`\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/delete\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"bulk_object_ids\": [\"obj_1\", \"obj_2\", \"obj_3\"],\n    \"passports\": [\"...\"],\n    \"delete_storage_data\": false\n  }'\n# Response: 204 No Content (all metadata deleted) or 4xx error (no objects deleted)\n```\n\n## Authentication\n\n**GA4GH Passports** (in request body):\n\n```json\n{\"passports\": [\"eyJhbGci...\"], \"delete_storage_data\": false}\n```\n\n**Bearer Tokens** (in headers):\n\n```bash\ncurl -H \"Authorization: Bearer token\" -d '{\"delete_storage_data\": false}' ...\n```\n\n## Underlying Storage Data\n\n**Important**: Storage data deletion is never guaranteed. Even when `delete_storage_data: true` is requested and the server supports it, the actual deletion may fail due to permissions, network issues, or storage service errors. Clients shoud not depend on storage deletion success.\n\nClients can request that the server attempts to delete the underlying data referred to by the DRS object using the `delete_storage_data` parameter.\n\n**`delete_storage_data: false`** (default): Removes DRS object metadata only, preserves underlying storage files\n\n**`delete_storage_data: true`**: Removes metadata AND requests server attempt to delete underlying storage files (requires `deleteStorageDataSupported: true`, **success not guaranteed**)\n\n## Update Pattern\n\nRather than introducing additional operations and endpoints for updating DRS objects, servers can allow clients to use the metadata-only deletion and object registration endpoints to create a new DRS object with updated metadata while leaving the underlying data in place.\n\n**Metadata update steps:**\n\n1. Delete metadata only: `POST /objects/{id}/delete` with `delete_storage_data: false`\n2. Re-register object: `POST /objects/register` with updated metadata\n\n```bash\n# Delete metadata (preserves storage)\ncurl -X POST \".../objects/obj_123/delete\" -d '{\"delete_storage_data\": false}'\n# Re-register with updates\ncurl -X POST \".../objects/register\" -d '{\"candidates\": [{\"name\": \"updated.txt\", ...}]}'\n```\n\n## Error Responses\n\n- **400**: Unsupported storage deletion or invalid request parameters\n- **403**: Insufficient permissions for any object in the request\n- **404**: Any object not found or delete endpoints not supported by server\n- **413**: Bulk request exceeds `maxBulkDeleteLength` limit\n\n## Examples\n\n**Metadata Update:**\n\n```bash\ncurl \".../service-info\"  # Check capabilities\ncurl -X POST \".../objects/obj_123/delete\" -d '{\"delete_storage_data\": false}'\ncurl -X POST \".../objects/register\" -d '{\"candidates\": [{\"name\": \"updated.vcf\", ...}]}'\n```\n\n**Complete Removal:**\n\n```bash\ncurl -X POST \".../objects/obj_456/delete\" -H \"Authorization: Bearer token\" \\\n  -d '{\"delete_storage_data\": true}'\n```\n\n**Bulk Delete (Atomic):**\n\n```bash\ncurl -X POST \".../objects/delete\" -d '{\n  \"bulk_object_ids\": [\"obj_1\", \"obj_2\"],\n  \"passports\": [\"...\"],\n  \"delete_storage_data\": false\n}'\n# All objects deleted or none deleted (transactional)\n```\n\n## Best Practices\n\n**Clients:** Check service-info, default to safe deletion, handle transactional failures, respect limits, confirm destructive operations, do not rely on underlying storage deletion\n\n**Servers:** Advertise capabilities, validate permissions, implement atomic transactions, implement limits, use versioning to avoid inadvertent deletion.\n\n## Security Considerations\n\n- **Authentication**: Validate GA4GH Passports and Bearer tokens\n- **HTTPS Required**: Protect credentials in transit\n- **Rate Limiting**: Prevent abuse of delete endpoints\n- **Input Validation**: Sanitize all request parameters\n\n## Backward Compatibility\n\nDelete functionality is designed to be backward compatible:\n\n- **No Impact on Existing Endpoints**: All existing DRS endpoints remain unchanged\n- **Optional Implementation**: Servers can ignore delete functionality entirely\n- **Graceful Degradation**: Clients receive 404 responses when delete is not supported\n- **Safe Defaults**: New fields in service-info have safe default values, and requests default to leaving underlying data in place.\n"
  - name: Access Method Update
    description: "# Access Method Updates\n\n> **Optional Functionality**: Access method updates are optional extensions to the DRS API. Not all DRS servers are required to implement this functionality. Clients should check `/service-info` for `accessMethodUpdateSupported` before attempting to use these endpoints.\n\nAccess method update endpoints allows authorized clients to modify how existing DRS objects can be accessed without changing the core object metadata (size, checksums, name). This is useful for storage migrations, adding mirrors, or updating URLs.\n\nThese endpoints will overwrite existing access methods for an object, if clients want to add access methods in addition to existing ones for objects they should first retrieve the current access methods and include them in the update request along with the new methods.\n\n## Use Cases\n\n- **Storage Migration**: Move data between storage providers while keeping same DRS object\n- **Mirror Addition**: Add CDN or regional access points for better performance  \n- **URL Refresh**: Update changed domain names\n- **Access Optimization**: Add or remove access methods based on performance or cost\n\n## Design Principles\n\n- **Optional**: Access method update support is completely optional\n- **Immutable Core**: Only access methods can be updated - size, checksums, name remain unchanged\n- **Atomic Bulk Operations**: All updates succeed or all fail (transactional)\n- **Optional Validation**: Servers MAY validate new access methods point to same data\n- **Flexible Authentication**: Supports GA4GH Passports, Bearer tokens, API keys\n\n## Service Discovery\n\nCheck `/service-info` for access method update capabilities:\n\n```json\n{\n  \"drs\": {\n    \"accessMethodUpdateSupported\": true,\n    \"maxBulkAccessMethodUpdateLength\": 100,\n    \"validateAccessMethodUpdates\": false\n  }\n}\n```\n\n- **`accessMethodUpdateSupported`**: Whether server supports access method updates\n- **`maxBulkAccessMethodUpdateLength`**: Maximum objects per bulk update request\n- **`validateAccessMethodUpdates`**: Whether server validates new access methods\n\n## Single Object Update\n\nUpdate access methods for a single DRS object:\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/obj_123/access-methods\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"access_methods\": [\n      {\n        \"type\": \"https\",\n        \"access_url\": {\n          \"url\": \"https://new-cdn.example.org/data/file.bam\"\n        }\n      },\n      {\n        \"type\": \"s3\",\n        \"access_id\": \"s3,\n        \"access_url\": {\n          \"url\": \"s3://new-bucket/migrated/file.bam\"\n        }\n      }\n    ]\n  }'\n```\n\n## Bulk Object Update\n\nUpdate access methods for multiple objects atomically:\n\n```bash\ncurl -X POST \"https://drs.example.org/objects/access-methods\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"updates\": [\n      {\n        \"object_id\": \"obj_123\",\n        \"access_methods\": [\n          {\n            \"type\": \"https\",\n            \"access_url\": {\"url\": \"https://new-location.com/file1.bam\"}\n          }\n        ]\n      },\n      {\n        \"object_id\": \"obj_456\", \n        \"access_methods\": [\n          {\n            \"type\": \"s3\",\n            \"access_url\": {\"url\": \"s3://new-bucket/file2.vcf\"}\n          }\n        ]\n      }\n    ]\n  }'\n```\n\n## Authentication\n\n**GA4GH Passports** (in request body):\n```json\n{\n  \"access_methods\": [...],\n  \"passports\": [\"eyJhbGci...\"]\n}\n```\n\n**Bearer Tokens** (in headers):\n```bash\ncurl -H \"Authorization: Bearer token\" -d '{\"access_methods\": [...]}' ...\n```\n\n## Validation\n\nServers MAY validate that new access methods point to the same data by checkingm file availability, checksums or file content. Validation behavior is advertised in `validateAccessMethodUpdates` service-info field.\n\n\n## Error Responses\n\n- **400**: Invalid access methods or validation failure\n- **401**: Authentication required\n- **403**: Insufficient permissions for object(s)\n- **404**: Object not found or access method updates not supported\n- **413**: Bulk request exceeds `maxBulkAccessMethodUpdateLength` limit\n\n## Examples\n\n**Storage Migration:**\n```bash\n# Check server capabilities\ncurl \"https://drs.example.org/service-info\"\n\n# Update single object after migration\ncurl -X POST \"https://drs.example.org/objects/obj_123/access-methods\" \\\n  -d '{\"access_methods\": [{\"type\": \"s3\", \"access_url\": {\"url\": \"s3://new-bucket/file.bam\"}}]}'\n```\n\n**Add CDN Mirror:**\n```bash\n# Add additional access method without removing existing ones\ncurl -X POST \"https://drs.example.org/objects/obj_456/access-methods\" \\\n  -d '{\n    \"access_methods\": [\n      {\"type\": \"https\", \"access_url\": {\"url\": \"https://origin.example.org/file.vcf\"}},\n      {\"type\": \"https\", \"access_url\": {\"url\": \"https://cdn.example.org/file.vcf\"}}\n    ]\n  }'\n```\n\n**Bulk Migration:**\n```bash\n# Migrate multiple objects atomically\ncurl -X POST \"https://drs.example.org/objects/access-methods\" \\\n  -d '{\n    \"updates\": [\n      {\"object_id\": \"obj_1\", \"access_methods\": [...]},\n      {\"object_id\": \"obj_2\", \"access_methods\": [...]}\n    ]\n  }'\n```\n\n## Best Practices\n\n**Clients**: Check service-info first, handle atomic transaction failures, respect bulk limits, verify permissions\n\n**Servers**: Advertise capabilities clearly, implement atomic transactions for bulk operations, validate permissions, consider optional validation for data integrity\n\n## Backward Compatibility\n\nAccess method update functionality is designed to be backward compatible:\n\n- **No Impact on Existing Endpoints**: All existing DRS endpoints remain unchanged\n- **Optional Implementation**: Servers can ignore this functionality entirely  \n- **Graceful Degradation**: Clients receive 404 responses when not supported\n- **Safe Defaults**: New service-info fields have safe default values"
paths:
  /service-info:
    get:
      summary: Retrieve information about this service
      description: "Returns information about the DRS service along with stats pertaning to total object count and cumulative size in bytes.\nAlso indicates whether the server supports optional upload and delete operations and which methods are available.\n\nExtends the\n[v1.0.0 GA4GH Service Info specification](https://github.com/ga4gh-discovery/ga4gh-service-info)\nas the standardized format for GA4GH web services to self-describe.\n\nAccording to the \n[service-info type registry](https://github.com/ga4gh/TASC/blob/master/service-info/ga4gh-service-info.json)\nmaintained by the [Technical Alignment Sub Committee (TASC)](https://github.com/ga4gh/TASC),\na DRS service MUST have:\n  * a `type.group` value of `org.ga4gh`\n  * a `type.artifact` value of `drs`\n\n**Example 1: Server with upload and delete capabilities**\n```\n{\n    \"id\": \"com.example.drs\",\n    \"description\": \"Serves data according to DRS specification\",\n    ...\n    \"type\": {\n        \"group\": \"org.ga4gh\",\n        \"artifact\": \"drs\",\n        \"version\": \"1.5\"\n    }\n    ...\n    \"drs\":{\n      \"maxBulkRequestLength\": 200,\n      \"objectCount\": 774560,\n      \"totalObjectSize\": 4018437188907752,\n      \"uploadRequestSupported\": true,\n      \"objectRegistrationSupported\": true,\n      \"supportedUploadMethods\": [\"s3\", \"https\", \"gs\"],\n      \"maxUploadSize\": 5368709120,\n      \"maxUploadRequestLength\": 50,\n      \"validateUploadChecksums\": true,\n      \"validateUploadFileSizes\": false,\n      \"relatedFileStorageSupported\": true,\n      \"deleteSupported\": true,\n      \"maxBulkDeleteLength\": 100,\n      \"deleteStorageDataSupported\": true\n    }\n}\n```\n\n**Example 2: Read-only server (no upload or delete)**\n```\n{\n    \"id\": \"com.example.readonly-drs\",\n    \"description\": \"Read-only DRS service\",\n    ...\n    \"type\": {\n        \"group\": \"org.ga4gh\",\n        \"artifact\": \"drs\",\n        \"version\": \"1.5\"\n    }\n    ...\n    \"drs\":{\n      \"maxBulkRequestLength\": 500,\n      \"objectCount\": 1250000,\n      \"totalObjectSize\": 8500000000000000\n    }\n}\n```\n\n**Example 3: Server with metadata-only delete capability**\n```\n{\n    \"id\": \"com.example.metadata-drs\",\n    \"description\": \"DRS service with metadata-only delete\",\n    ...\n    \"type\": {\n        \"group\": \"org.ga4gh\",\n        \"artifact\": \"drs\",\n        \"version\": \"1.5\"\n    }\n    ...\n    \"drs\":{\n      \"maxBulkRequestLength\": 200,\n      \"objectCount\": 500000,\n      \"totalObjectSize\": 2500000000000000,\n      \"deleteSupported\": true,\n      \"maxBulkDeleteLength\": 50,\n      \"deleteStorageDataSupported\": false\n    }\n}\n```\n\nSee the [Service Registry Appendix](#tag/GA4GH-Service-Registry) for more information on how to register a DRS service with a service registry."
      operationId: GetServiceInfo
      responses:
        '200':
          $ref: '#/components/responses/200ServiceInfo'
        '500':
          $ref: '#/components/responses/500InternalServerError'
      tags:
        - Service Info
  /objects/{object_id}:
    options:
      summary: Get Authorization info about a DrsObject.
      security:
        - {}
      description: Returns a list of `Authorizations` that can be used to determine how to authorize requests to `GetObject` or `PostObject`.
      operationId: OptionsObject
      parameters:
        - $ref: '#/components/parameters/ObjectId'
      responses:
        '200':
          $ref: '#/components/responses/200OkAuthorizations'
        '204':
