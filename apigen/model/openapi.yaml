        '413':
          $ref: '#/components/responses/413RequestTooLarge'
        '500':
          $ref: '#/components/responses/500InternalServerError'
      tags:
        - Objects
      x-swagger-router-controller: ga4gh.drs.server
      x-codegen-request-body-name: body
