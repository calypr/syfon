package: internalapi
generate:
  models: true
  fiber-server: true
  strict-server: true
import-mapping:
  ./openapi.yaml: github.com/calypr/syfon/apigen/server/drs
output-options:
  skip-prune: false
  user-templates:
    imports.tmpl: apigen/templates/imports.tmpl
    fiber/fiber-handler.tmpl: apigen/templates/fiber/fiber-handler.tmpl
    fiber/fiber-interface.tmpl: apigen/templates/fiber/fiber-interface.tmpl
    fiber/fiber-middleware.tmpl: apigen/templates/fiber/fiber-middleware.tmpl
    strict/strict-fiber.tmpl: apigen/templates/strict/strict-fiber.tmpl
    strict/strict-fiber-interface.tmpl: apigen/templates/strict/strict-fiber-interface.tmpl
