site_name: drs-server
theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.annotate


nav:
  - Home: index.md
  - Configuration: configuration.md
  - Deployment: deployment.md
  - Troubleshooting: troubleshooting.md
  - Architecture:
      - Overview: adr/index.md
      - ADRs:
          - ADR 0001 - openapi request/response validation: adr/adr-0001-request-response-validation.md
          - ADR 0002 - ga4gh passports for authorization: adr/adr-0002-passports-ControlledAccessGrants.md

plugins:
  - search


markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
