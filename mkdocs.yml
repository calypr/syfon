site_name: drs-server
theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.annotate


nav:
  - Home: index.md
  - Configuration: configuration.md
  - Deployment: deployment.md
  - Troubleshooting: troubleshooting.md
  - Architecture:
      - Overview: adr/index.md
      - Topics:
          - openapi request/response validation: adr/adr-0001-request-response-validation.md
          - ga4gh passports for authorization: adr/adr-0002-passports-ControlledAccessGrants.md

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
